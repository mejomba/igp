<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اینستاگرام ساده</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- اضافه کردن jQuery -->
    <script src="/static/js/jquery.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>📸 اینستاگرام ساده</h1>
            <div id="auth-section">
                <div id="user-info" style="display:none;">
                    <span id="username-display"></span>
                    <button onclick="logout()">خروج</button>
                </div>
                <div id="login-section">
                    <input type="text" id="login-username" placeholder="نام کاربری">
                    <input type="password" id="login-password" placeholder="رمز عبور">
                    <button onclick="login()">ورود</button>
                    <button onclick="showRegister()">ثبت نام</button>
                </div>
            </div>
        </header>

        <div id="register-section" style="display:none;">
            <h3>ثبت نام</h3>
            <input type="text" id="reg-username" placeholder="نام کاربری">
            <input type="password" id="reg-password" placeholder="رمز عبور">
            <input type="email" id="reg-email" placeholder="ایمیل">
            <button onclick="register()">ثبت نام</button>
            <button onclick="hideRegister()">بازگشت</button>
        </div>

        <div id="create-post-section" style="display:none;">
            <h3>پست جدید</h3>
            <input type="file" id="post-image" accept="image/*">
            <textarea id="post-caption" placeholder="متن پست..."></textarea>
            <button onclick="createPost()">ارسال پست</button>
        </div>

        <div id="posts-container"></div>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
